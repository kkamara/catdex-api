<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Catdex</title>
  <link rel="stylesheet" href="/static/css/index.css" type="text/css" />
</head>

<body>
  <h1>Catdex</h1>
  <section class="cats" id="cats">
    <p>No cats yet</p>
  </section>

  <script charset="utf-8">
    document.addEventListener("DOMContentLoaded", () => {
      fetch('/api/cats')
        .then((response) => response.json())
        .then((cats) => {
          // Clear the "No cats yet"
          document.getElementById("cats").innerText = ""
          for (cat of cats) {
            const catElement = document.createElement("article")
            catElement.classList.add("cat")
            const catTitle = document.createElement("h3")
            const catLink = document.createElement("a")
            catLink.innerText = cat.name
            const link = `/static/cat.html?id=${cat.id}`
            catLink.href = link
            const catImageLink = document.createElement("a")
            catImageLink.href = link
            catImageLink.classList.add("cat-image-link")
            const catImage = document.createElement("img")
            catImage.src = cat.image_path
            catImageLink.appendChild(catImage)
            catTitle.appendChild(catLink)
            catElement.appendChild(catTitle)
            catElement.appendChild(catImageLink)
            document.getElementById("cats")
              .appendChild(catElement)
          }
        })
    })
  </script>
</body>

</html>
